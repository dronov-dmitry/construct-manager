name: Release build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: construct-manager-linux.tar.gz
          - os: windows-latest
            target: windows
            artifact: construct-manager-windows.zip
          - os: macos-latest
            target: macos
            artifact: construct-manager-macos.tar.gz

    defaults:
      run:
        working-directory: client/construct_manager

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build for ${{ matrix.target }}
        run: flutter build ${{ matrix.target }} --release

      - name: Package Linux artifacts
        if: matrix.target == 'linux'
        run: |
          tar -czf ${{ matrix.artifact }} -C build/linux/x64/release/bundle .

      - name: Package Windows artifacts
        if: matrix.target == 'windows'
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ${{ matrix.artifact }}

      - name: Package macOS artifacts
        if: matrix.target == 'macos'
        run: |
          tar -czf ${{ matrix.artifact }} -C build/macos/Build/Products/Release .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: client/construct_manager/${{ matrix.artifact }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/construct_manager

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" > android/keystore.b64
            base64 -d android/keystore.b64 > android/keystore.jks
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
            echo "keyAlias=construct-manager" >> android/key.properties
            echo "storeFile=keystore.jks" >> android/key.properties
            echo "Keystore configured from secrets"
          else
            echo "No KEYSTORE_BASE64 secret — APK will be released with debug key"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/construct-manager.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: client/construct_manager/build/app/outputs/flutter-apk/construct-manager.apk
          generate_release_notes: true
