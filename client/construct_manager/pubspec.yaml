name: construct_manager
description: "Construction project management application"
publish_to: 'none'
version: 0.0.15

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0
  gotrue: ^2.20.0

  # Navigation
  go_router: ^14.8.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Local database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Image picking & caching
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.70.2

  # Auth & Security
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Utils
  uuid: ^4.5.1
  image: ^4.5.3
  url_launcher: ^6.3.1
  http: ^1.2.0
  open_filex: ^4.5.0
  package_info_plus: ^8.0.0
  file_picker: ^8.0.0
  flutter_lints: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  drift_dev: ^2.25.0
  riverpod_generator: ^2.6.3
  injectable_generator: ^2.7.0
  mockito: ^5.4.6

flutter:
  uses-material-design: true

  generate: true
